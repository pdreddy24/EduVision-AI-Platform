services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
  api:
    profiles: ["full"]
    build: ./Backend/Backend
    env_file: ./Backend/Backend/.env
    environment:
      REDIS_URL: redis://redis:6379
      STORAGE_DRIVER: local
      UPLOAD_STAGING_DIR: /app/uploads/staging
    command: node server.js
    ports:
      - "5000:5000"
    volumes:
      - local-uploads:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
  worker:
    profiles: ["full"]
    build: ./Backend/Backend
    env_file: ./Backend/Backend/.env
    environment:
      REDIS_URL: redis://redis:6379
      STORAGE_DRIVER: local
      UPLOAD_STAGING_DIR: /app/uploads/staging
    command: node workers/parserWorker.js
    volumes:
      - local-uploads:/app/uploads
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data:
  local-uploads:

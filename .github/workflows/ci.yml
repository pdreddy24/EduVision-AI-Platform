name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: Backend/Backend/package-lock.json }
      - run: npm ci
        working-directory: Backend/Backend
      - run: npm test
        working-directory: Backend/Backend
      - run: npm run check
        working-directory: Backend/Backend
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: AiUser/package-lock.json }
      - run: npm ci
        working-directory: AiUser
      - run: npm run build
        working-directory: AiUser
